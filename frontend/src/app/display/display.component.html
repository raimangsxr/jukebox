<main class="flex min-h-screen flex-col p-4 md:p-6">
  <section
    *ngIf="displayError"
    class="flex flex-1 flex-col items-center justify-center rounded-xl border border-red-500/30 bg-jukebox-surface p-8 text-center"
  >
    <p class="text-xs uppercase tracking-[0.2em] text-jukebox-muted">Pantalla kiosk</p>
    <h1 class="mt-2 text-2xl font-bold text-red-400">{{ displayError }}</h1>
    <p class="mt-4 max-w-md text-sm text-jukebox-muted">
      Contacta con el operador para generar un nuevo token de embed en el panel de administración.
    </p>
  </section>

  <ng-container *ngIf="showContent">
    <header class="mb-4">
      <p class="text-xs uppercase tracking-[0.2em] text-jukebox-muted">Pantalla kiosk</p>
      <h1 class="text-3xl font-bold text-jukebox-primary">AMRN Jukebox</h1>
    </header>

    <section class="grid flex-1 gap-4 lg:grid-cols-3">
      <div
        class="flex min-h-48 items-center justify-center rounded-xl border border-white/10 bg-jukebox-surface lg:col-span-2"
      >
        <p class="text-jukebox-muted">Reproductor YouTube (2/3)</p>
      </div>
      <div
        class="flex min-h-48 items-center justify-center rounded-xl border border-white/10 bg-jukebox-surface"
      >
        <p class="text-center text-jukebox-muted">QR + instrucciones (1/3)</p>
      </div>
      <div
        class="flex min-h-32 items-center justify-center rounded-xl border border-white/10 bg-jukebox-surface lg:col-span-3"
      >
        <p class="text-jukebox-muted">Cola + votos (ancho completo)</p>
      </div>
    </section>
  </ng-container>
</main>
