<main
  *ngIf="displayError"
  class="flex min-h-screen flex-col p-4 md:p-6"
>
  <section
    class="flex flex-1 flex-col items-center justify-center rounded-xl border border-red-500/30 bg-jukebox-surface p-8 text-center"
  >
    <p class="text-xs uppercase tracking-[0.2em] text-jukebox-muted">Pantalla kiosk</p>
    <h1 class="mt-2 text-2xl font-bold text-red-400">{{ displayError }}</h1>
    <p class="mt-4 max-w-md text-sm text-jukebox-muted">
      Contacta con el operador para generar un nuevo token de embed en el panel de administración.
    </p>
  </section>
</main>

<main
  *ngIf="showContent"
  class="kiosk-root flex flex-col overflow-hidden p-4 md:p-6"
  [style.--jukebox-app-height.px]="(displayState.state$ | async)?.event_config?.app_height_px || 720"
>
  <header class="mb-3 shrink-0">
    <h1 class="text-2xl font-bold text-jukebox-primary">
      {{ (displayState.state$ | async)?.event_config?.name || 'AMRN Jukebox' }}
    </h1>
  </header>

  <section class="kiosk-top grid min-h-0 flex-1 gap-4 md:grid-cols-3">
    <aside class="flex min-h-0 flex-col gap-4">
      <app-qr-panel
        class="shrink-0"
        [eventConfig]="(displayState.state$ | async)?.event_config ?? null"
      />
      <app-queue-strip
        class="min-h-0 flex-1"
        [entries]="(displayState.state$ | async)?.queue ?? []"
      />
    </aside>
    <app-youtube-player
      class="min-h-0 md:col-span-2"
      [videoId]="(displayState.state$ | async)?.now_playing?.youtube_video_id ?? null"
      [title]="(displayState.state$ | async)?.now_playing?.title ?? null"
      (ended)="onVideoEnded()"
    />
  </section>
</main>
