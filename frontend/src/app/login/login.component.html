<main class="flex min-h-screen items-center justify-center p-4">
  <section class="w-full max-w-sm rounded-xl border border-white/10 bg-jukebox-surface p-6">
    <h1 class="mb-2 text-xl font-bold">Acceso moderador</h1>
    <p class="mb-6 text-sm text-jukebox-muted">
      Inicia sesión para gestionar el jukebox del evento.
    </p>
    <form class="space-y-4" (ngSubmit)="submit()">
      <label class="block text-sm">
        Usuario
        <input
          class="mt-1 w-full rounded-lg border border-white/10 bg-jukebox-deep px-3 py-2"
          type="text"
          name="username"
          autocomplete="username"
          [(ngModel)]="username"
          required
        />
      </label>
      <label class="block text-sm">
        Contraseña
        <input
          class="mt-1 w-full rounded-lg border border-white/10 bg-jukebox-deep px-3 py-2"
          type="password"
          name="password"
          autocomplete="current-password"
          [(ngModel)]="password"
          required
        />
      </label>
      <p *ngIf="errorMessage" class="text-sm text-red-400">{{ errorMessage }}</p>
      <button
        type="submit"
        class="w-full rounded-lg bg-jukebox-accent px-4 py-2 font-semibold text-white disabled:opacity-50"
        [disabled]="submitting"
      >
        {{ submitting ? 'Entrando…' : 'Entrar' }}
      </button>
    </form>
  </section>
</main>
