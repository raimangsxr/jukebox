server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
