apiVersion: v1
kind: Service
metadata:
  name: jukebox-backend
  namespace: jukebox
  labels:
    app.kubernetes.io/name: jukebox-backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jukebox-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jukebox-backend
  namespace: jukebox
  labels:
    app.kubernetes.io/name: jukebox-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jukebox-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jukebox-backend
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: rromani/jukebox-backend:0.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: JUKEBOX_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: jukebox-secrets
                  key: JUKEBOX_DATABASE_URL
            - name: JUKEBOX_OPERATOR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jukebox-secrets
                  key: JUKEBOX_OPERATOR_USERNAME
            - name: JUKEBOX_OPERATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jukebox-secrets
                  key: JUKEBOX_OPERATOR_PASSWORD
            - name: JUKEBOX_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: jukebox-secrets
                  key: JUKEBOX_SESSION_SECRET
            - name: JUKEBOX_CORS_ALLOW_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: jukebox-config
                  key: JUKEBOX_CORS_ALLOW_ORIGINS
            - name: JUKEBOX_COOKIE_SECURE
              valueFrom:
                configMapKeyRef:
                  name: jukebox-config
                  key: JUKEBOX_COOKIE_SECURE
            - name: JUKEBOX_FRAME_ANCESTORS
              valueFrom:
                configMapKeyRef:
                  name: jukebox-config
                  key: JUKEBOX_FRAME_ANCESTORS
            - name: JUKEBOX_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: jukebox-secrets
                  key: JUKEBOX_GOOGLE_CLIENT_ID
            - name: JUKEBOX_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jukebox-secrets
                  key: JUKEBOX_GOOGLE_CLIENT_SECRET
            - name: JUKEBOX_YOUTUBE_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: jukebox-secrets
                  key: JUKEBOX_YOUTUBE_API_KEYS
            - name: JUKEBOX_GOOGLE_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: jukebox-config
                  key: JUKEBOX_GOOGLE_REDIRECT_URI
            - name: JUKEBOX_PARTICIPANT_OAUTH_RETURN_URL
              valueFrom:
                configMapKeyRef:
                  name: jukebox-config
                  key: JUKEBOX_PARTICIPANT_OAUTH_RETURN_URL
            - name: JUKEBOX_MAX_PENDING_SUBMISSIONS_PER_PARTICIPANT
              valueFrom:
                configMapKeyRef:
                  name: jukebox-config
                  key: JUKEBOX_MAX_PENDING_SUBMISSIONS_PER_PARTICIPANT
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
