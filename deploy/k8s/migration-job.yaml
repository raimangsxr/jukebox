apiVersion: batch/v1
kind: Job
metadata:
  name: jukebox-migrate
  namespace: jukebox
  labels:
    app.kubernetes.io/name: jukebox-migrate
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jukebox-migrate
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: rromani/jukebox-backend:0.1
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: JUKEBOX_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: jukebox-secrets
                  key: JUKEBOX_DATABASE_URL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
