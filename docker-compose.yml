x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile

x-backend-env: &backend-env
  JUKEBOX_DATABASE_URL: postgresql+psycopg://jukebox:${JUKEBOX_DATABASE_PASSWORD}@postgres:5432/jukebox
  JUKEBOX_CORS_ALLOW_ORIGINS: ${JUKEBOX_CORS_ALLOW_ORIGINS:-http://localhost:8080,http://localhost:4200}
  JUKEBOX_OPERATOR_USERNAME: ${JUKEBOX_OPERATOR_USERNAME:-op}
  JUKEBOX_OPERATOR_PASSWORD: ${JUKEBOX_OPERATOR_PASSWORD:?set JUKEBOX_OPERATOR_PASSWORD in .env}
  JUKEBOX_SESSION_SECRET: ${JUKEBOX_SESSION_SECRET:?set JUKEBOX_SESSION_SECRET in .env}
  JUKEBOX_COOKIE_SECURE: ${JUKEBOX_COOKIE_SECURE:-false}
  JUKEBOX_FRAME_ANCESTORS: ${JUKEBOX_FRAME_ANCESTORS:-'none'}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: jukebox
      POSTGRES_PASSWORD: ${JUKEBOX_DATABASE_PASSWORD:?set JUKEBOX_DATABASE_PASSWORD in .env}
      POSTGRES_DB: jukebox
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jukebox -d jukebox"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: jukebox-backend:local
    build: *backend-build
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *backend-env
    command: ["alembic", "upgrade", "head"]

  backend:
    image: jukebox-backend:local
    build: *backend-build
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment: *backend-env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
      args:
        NODE_IMAGE: node:24-alpine
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: npm run start -- --host 0.0.0.0 --port 4200 --poll 2000

volumes:
  postgres-data:
  frontend_node_modules:
